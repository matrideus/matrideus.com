<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Privacy Policies – Matrideus</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --clr-primary: #2f5d41; /* deep evergreen */
        --clr-primary-light: #6fb08e; /* soft mint */
        --clr-bg: #f5f9f7; /* light green-gray */
        --clr-text: #333;
      }

      /* CSS reset-ish */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: var(--clr-text);
        background: var(--clr-bg);
        line-height: 1.6;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* ------------ Layout ------------ */
      header {
        background: var(--clr-primary);
        color: #fff;
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .brand {
        font-weight: 700;
        font-size: 1.25rem;
        letter-spacing: 0.5px;
      }

      .brand a {
        color: #fff;
      }

      nav ul {
        list-style: none;
        display: flex;
        gap: 1.5rem;
      }

      nav a {
        color: #fff;
      }

      nav a:hover {
        opacity: 0.85;
      }

      /* Content */
      .content {
        max-width: 1100px;
        margin: 3rem auto;
        padding: 2rem;
      }

      .content h1 {
        font-size: 2.5rem;
        color: var(--clr-primary);
        margin-bottom: 1rem;
        text-align: center;
      }

      .content > p {
        text-align: center;
        margin-bottom: 3rem;
        font-size: 1.125rem;
        color: #666;
      }

      /* App Cards */
      .apps-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
        margin-top: 2rem;
      }

      .app-card {
        background: #fff;
        border-radius: 0.75rem;
        box-shadow: 0 4px 12px rgb(0 0 0 / 0.08);
        padding: 2rem;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .app-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 20px rgb(0 0 0 / 0.12);
      }

      .app-card img {
        width: 120px;
        height: 120px;
        object-fit: contain;
        margin-bottom: 1.5rem;
        border-radius: 0.5rem;
      }

      .app-card h2 {
        font-size: 1.5rem;
        color: var(--clr-primary);
        margin-bottom: 0.75rem;
      }

      .app-card p {
        font-size: 0.95rem;
        color: #666;
        margin-bottom: 1.5rem;
        flex-grow: 1;
      }

      .app-card .btn {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background: var(--clr-primary);
        color: #fff;
        border-radius: 0.5rem;
        font-weight: 600;
        letter-spacing: 0.25px;
        transition: background 0.2s ease;
      }

      .app-card .btn:hover {
        background: var(--clr-primary-light);
      }

      /* Footer */
      footer {
        background: var(--clr-primary);
        color: #fff;
        text-align: center;
        padding: 1rem;
        font-size: 0.875rem;
        margin-top: 4rem;
      }

      footer a {
        color: #fff;
        text-decoration: underline;
      }

      footer a:hover {
        opacity: 0.85;
      }

      @media (max-width: 768px) {
        .content {
          margin: 1.5rem;
          padding: 1rem;
        }

        .content h1 {
          font-size: 2rem;
        }

        .apps-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (prefers-reduced-motion: no-preference) {
        html {
          scroll-behavior: smooth;
        }
      }
    </style>
  </head>
  <body>
    <!-- ------------- Header ------------- -->
    <header>
      <div class="brand"><a href="index.html">Matrideus</a></div>
      <nav>
        <ul>
          <li><a href="index.html#hero">Home</a></li>
          <li><a href="index.html#foxgloves">FoxGloves</a></li>
          <li><a href="index.html#contact">Contact</a></li>
        </ul>
      </nav>
    </header>

    <!-- ------------- Privacy Policies Content ------------- -->
    <div class="content">
      <h1>Privacy Policies</h1>
      <p>Select an application below to view its privacy policy.</p>

      <div class="apps-grid">
        <!-- FoxGloves App Card -->
        <a href="privacy-policies/foxgloves.html" class="app-card">
          <img src="assets/FoxGlovesLogo.png" alt="FoxGloves app logo" />
          <h2>FoxGloves</h2>
          <p>A comprehensive platform designed for professional gardeners.</p>
        </a>

        <!-- Additional apps can be added here in the future -->
      </div>
    </div>

    <!-- ------------- Footer ------------- -->
    <footer>
      © <span id="year"></span> Matrideus. All rights reserved. | <a href="index.html">Home</a>
    </footer>

    <script>
      // Update footer year automatically
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
